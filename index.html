<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEX AI | Advanced Neural Art Generator</title>
    <meta name="description" content="Create stunning AI art with Synax AI. Advanced text-to-image generation with futuristic aesthetics.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Core Palette */
            --bg-deep: #05050a;
            --bg-panel: rgba(20, 20, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Accents */
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.6);
            --accent: #f43f5e;
            --accent-glow: rgba(244, 63, 94, 0.5);
            --cyan: #06b6d4;
            
            /* Text */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            /* UI Elements */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Reset & Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Animated Background Canvas --- */
        #neural-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
        }

        /* --- Layout --- */
        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            height: calc(100vh - 40px);
            align-items: start;
        }

        @media (max-width: 1024px) {
            .app-wrapper {
                grid-template-columns: 1fr;
                height: auto;
                padding-bottom: 80px;
            }
        }

        /* --- Glassmorphism Panels --- */
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header / Sidebar --- */
        .sidebar {
            gap: 20px;
            padding: 24px;
            height: 100%;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
            font-size: 20px;
            animation: pulse-glow 3s infinite;
        }

        .brand h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Form Elements --- */
        .form-group { margin-bottom: 20px; position: relative; }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            resize: none;
            height: 120px;
            transition: var(--transition);
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .magic-btn {
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .magic-btn:hover { color: #fff; text-shadow: 0 0 10px var(--cyan); }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            appearance: none;
            cursor: pointer;
            transition: var(--transition);
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 10px;
        }
        select:hover, select:focus { border-color: var(--primary); outline: none; }

        /* --- Main Action Button --- */
        .generate-btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6); }
        .generate-btn:hover::before { left: 100%; }
        .generate-btn:active { transform: translateY(0); }
        .generate-btn:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.5); transform: none; }

        /* --- Main Output Area --- */
        .main-display {
            padding: 24px;
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        /* --- Progress Bar --- */
        .progress-wrapper {
            margin-bottom: 24px;
            display: none; /* Hidden by default */
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--cyan));
            border-radius: 10px;
            transition: width 0.4s ease;
            position: relative;
        }
        .progress-fill::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: translateX(-100%);
            animation: shimmer 1.5s infinite;
        }

        /* --- Image Grid --- */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            flex-grow: 1;
        }

        .image-card {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
            aspect-ratio: 1;
            cursor: zoom-in;
            transition: var(--transition);
            animation: fadeInUp 0.5s ease backwards;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            opacity: 0;
            transition: var(--transition);
        }

        .image-card:hover .image-actions { opacity: 1; }

        .icon-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .icon-btn:hover { background: var(--primary); transform: scale(1.1); }

        /* --- Empty State --- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* --- Loader --- */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            width: 100%;
            grid-column: 1 / -1;
        }
        .scifi-loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .scifi-loader::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 3px solid rgba(255,255,255,0.1);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
        }

        /* --- Toast Notification --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 14px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }
        .toast.warning { border-color: #f59e0b; }

        /* --- Lightbox --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.2);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
        }
        .lightbox-close:hover { opacity: 1; transform: rotate(90deg); }
        .lightbox-actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        /* --- Animations --- */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px var(--primary-glow); }
            50% { box-shadow: 0 0 25px var(--primary-glow); }
            100% { box-shadow: 0 0 10px var(--primary-glow); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    </style>
</head>
<body>

    <!-- Canvas Background -->
    <canvas id="neural-canvas"></canvas>

    <div class="app-wrapper">
        <!-- Sidebar: Controls -->
        <aside class="glass-panel sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-cube"></i></div>
                <h1>GEX AI</h1>
            </div>

            <div class="form-group">
                <label>
                    <span>Prompt</span>
                    <button class="magic-btn" id="magic-btn"><i class="fas fa-wand-magic-sparkles"></i> Magic</button>
                </label>
                <textarea id="prompt" placeholder="A futuristic cyberpunk city with neon rain, highly detailed, 8k render..."></textarea>
                <div style="text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                    <span id="char-count">0</span>/2000
                </div>
            </div>

            <div class="form-group">
                <label>Settings</label>
                <div class="grid-2">
                    <div>
                        <span style="font-size: 11px; color: var(--text-muted);">Aspect Ratio</span>
                        <select id="image-size">
                            <option value="square">Square (1:1)</option>
                            <option value="portrait">Portrait (2:3)</option>
                            <option value="landscape">Landscape (16:9)</option>
                        </select>
                    </div>
                    <div>
                        <span style="font-size: 11px; color: var(--text-muted);">Count</span>
                        <select id="image-count">
                            <option value="1">1 Image</option>
                            <option value="2" selected>2 Images</option>
                            <option value="4">4 Images</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div>
                    <span style="font-size: 11px; color: var(--text-muted);">Style Preset</span>
                    <select id="image-style">
                        <option value="">No Style (Raw)</option>
                        <option value="realistic">Photorealistic</option>
                        <option value="anime" selected>Anime / Manga</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="fantasy">Dark Fantasy</option>
                        <option value="3d">3D Render</option>
                        <option value="painting">Oil Painting</option>
                    </select>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn">
                <i class="fas fa-bolt"></i> Generate Art
            </button>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                <div style="font-size: 12px; color: var(--text-muted); text-align: center;">
                    Powered by @GEX_BWA on Telegram
                </div>
            </div>
        </aside>

        <!-- Main: Output -->
        <main class="glass-panel main-display">
            <!-- Progress Bar -->
            <div class="progress-wrapper" id="progress-container">
                <div class="progress-info">
                    <span id="progress-status">Initializing...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <!-- Image Grid -->
            <div class="image-grid" id="image-grid">
                <!-- Empty State -->
                <div class="empty-state" id="empty-state" style="grid-column: 1/-1;">
                    <i class="fas fa-layer-group"></i>
                    <h3>Ready to Create</h3>
                    <p>Enter a prompt and hit Generate to see the magic happen.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Lightbox Overlay -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close"><i class="fas fa-times"></i></button>
        <img id="lightbox-img" src="" alt="Full view">
        <div class="lightbox-actions">
            <button class="generate-btn" id="lightbox-download" style="width: auto; padding: 10px 24px;">
                <i class="fas fa-download"></i> Download HD
            </button>
        </div>
    </div>

    <script>
        /**
         * SYNAX AI - Advanced Logic (No ReCAPTCHA Version)
         */

        /* --- 1. Canvas Background Animation --- */
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const particleCount = 60; 
        const connectionDistance = 150;
        const mouseDistance = 200;

        let mouse = { x: null, y: null };

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? 'rgba(99, 102, 241, ' : 'rgba(244, 63, 94, '; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouseDistance) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouseDistance - distance) / mouseDistance;
                        const directionX = forceDirectionX * force * 0.6;
                        const directionY = forceDirectionY * force * 0.6;
                        this.vx -= directionX;
                        this.vy -= directionY;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + '0.5)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        ctx.beginPath();
                        let opacity = 1 - (distance / connectionDistance);
                        ctx.strokeStyle = 'rgba(148, 163, 184, ' + (opacity * 0.2) + ')';
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateCanvas);
        }

        resizeCanvas();
        animateCanvas();

        /* --- 2. Application State & Logic --- */
        
        const dom = {
            prompt: document.getElementById('prompt'),
            charCount: document.getElementById('char-count'),
            magicBtn: document.getElementById('magic-btn'),
            generateBtn: document.getElementById('generate-btn'),
            imageSize: document.getElementById('image-size'),
            imageCount: document.getElementById('image-count'),
            imageStyle: document.getElementById('image-style'),
            imageGrid: document.getElementById('image-grid'),
            progressContainer: document.getElementById('progress-container'),
            progressFill: document.getElementById('progress-fill'),
            progressStatus: document.getElementById('progress-status'),
            progressPercent: document.getElementById('progress-percent'),
            emptyState: document.getElementById('empty-state'),
            toastContainer: document.getElementById('toast-container'),
            lightbox: document.getElementById('lightbox'),
            lightboxImg: document.getElementById('lightbox-img'),
            lightboxClose: document.getElementById('lightbox-close'),
            lightboxDownload: document.getElementById('lightbox-download')
        };

        const state = {
            isGenerating: false,
            abortController: null,
            generatedImages: []
        };

        const magicPrompts = [
            "A cyberpunk street food vendor in neon-lit Tokyo, rain slick streets, reflection",
            "Portrait of a sentient robot with human eyes, oil painting style, intricate details",
            "A floating island in the sky with waterfalls, fantasy art, dreamy atmosphere",
            "Futuristic concept car, aerodynamic design, white background, studio lighting",
            "An astronaut reading a book on Mars, realistic, 8k resolution",
            "Crystal dragon sleeping in a cave, bioluminescent glow, dark fantasy"
        ];

        const showToast = (msg, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${msg}` : `<i class="fas fa-exclamation-triangle"></i> ${msg}`;
            dom.toastContainer.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };

        const downloadImage = async (url, filename) => {
            // Method 1: Try Blob Download
            try {
                const response = await fetch(url, { mode: 'cors' });
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename || `synax-art-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('Image saved successfully');
                return;
            } catch (e) {
                console.warn("Direct download blocked by CORS, opening in new tab", e);
            }

            // Method 2: Fallback to New Tab
            try {
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('Opened in new tab (Right-click to save)', 'warning');
            } catch (err) {
                showToast('Could not download image', 'error');
            }
        };

        dom.prompt.addEventListener('input', () => {
            dom.charCount.textContent = dom.prompt.value.length;
        });

        dom.magicBtn.addEventListener('click', () => {
            const randomPrompt = magicPrompts[Math.floor(Math.random() * magicPrompts.length)];
            dom.prompt.value = randomPrompt;
            dom.charCount.textContent = randomPrompt.length;
            dom.prompt.focus();
        });

        dom.lightboxClose.addEventListener('click', () => {
            dom.lightbox.classList.remove('active');
        });

        dom.lightbox.addEventListener('click', (e) => {
            if (e.target === dom.lightbox) dom.lightbox.classList.remove('active');
        });

        dom.lightboxDownload.addEventListener('click', () => {
            if (dom.lightboxImg.src) downloadImage(dom.lightboxImg.src, 'synax-hd.jpg');
        });

        /* --- 3. API Integration (NO ReCAPTCHA) --- */
        
        async function handleGenerate() {
            if (state.isGenerating) return;

            const prompt = dom.prompt.value.trim();
            if (!prompt) {
                showToast("Please describe your idea first!", "error");
                return;
            }

            // UI Reset
            state.isGenerating = true;
            state.abortController = new AbortController();
            dom.generateBtn.disabled = true;
            dom.generateBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Generating...';
            dom.emptyState.style.display = 'none';
            dom.imageGrid.innerHTML = ''; 
            dom.progressContainer.style.display = 'block';
            updateProgress(0, "Connecting...");

            // Insert loaders
            const count = parseInt(dom.imageCount.value);
            for(let i=0; i<count; i++) {
                const loader = document.createElement('div');
                loader.className = 'loader-container';
                loader.innerHTML = '<div class="scifi-loader"></div>';
                dom.imageGrid.appendChild(loader);
            }

            try {
                // 1. Login (Anonymous) - Removed ReCAPTCHA
                const sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                
                // Note: Without ReCAPTCHA, this API might reject the request if it strictly enforces it.
                // If you see "Authentication failed", it's because the server requires ReCAPTCHA token.
                const loginRes = await fetchWithTimeout("https://api.seaart.io/art-studio/v1/account/login", {
                    method: "POST",
                    headers: { 
                        "X-Device-ID": sessionId, 
                        "Content-Type": "application/json"
                        // Removed "X-Recaptcha-Token"
                    },
                    body: JSON.stringify({ type: 16 })
                }, 10000, state.abortController.signal);

                const loginData = await loginRes.json();
                const userToken = loginData?.data?.token;
                
                if (!userToken) {
                    throw new Error("API Authentication failed. This might require a valid ReCAPTCHA token.");
                }

                updateProgress(15, "Processing Prompt...");

                // 2. Prepare Request
                const sizeMap = {
                    'square': [512, 512],
                    'portrait': [512, 768],
                    'landscape': [768, 512]
                };
                const [w, h] = sizeMap[dom.imageSize.value] || [512, 512];
                
                let finalPrompt = prompt;
                const styleVal = dom.imageStyle.value;
                if(styleVal) {
                    const styles = {
                        'realistic': 'hyperrealistic, 8k, photograph, detailed texture',
                        'anime': 'anime style, vibrant colors, studio ghibli, detailed face',
                        'cyberpunk': 'cyberpunk, neon lights, futuristic, sci-fi, high tech',
                        'fantasy': 'fantasy art, ethereal, magical, intricate, oil painting',
                        '3d': '3d render, octane render, unreal engine 5, cinematic lighting',
                        'painting': 'oil painting, classic art, brush strokes, masterpiece'
                    };
                    finalPrompt = `${prompt}, ${styles[styleVal]}`;
                }

                const seed = Math.floor(Math.random() * 1000000000);
                const meta = {
                    prompt: finalPrompt,
                    seed: seed,
                    n_iter: count,
                    width: w,
                    height: h,
                    prompt_magic_mode: 1,
                    init_images: [],
                    denoising_strength: 0.75,
                    aspect: `${w}:${h}`,
                    visibility: 2,
                    seed_mode: 1,
                    isHomeTask: "yes"
                };

                updateProgress(20, "Allocating GPU...");

                // 3. Start Generation
                const genRes = await fetchWithTimeout("https://api.seaart.io/art-studio/v1/generate/text-to-img", {
                    method: "POST",
                    headers: {
                        "X-Device-ID": sessionId,
                        "Token": userToken,
                        "X-Device-OS": "web",
                        "Content-Type": "application/json"
                        // Removed "X-Recaptcha-Token"
                    },
                    body: JSON.stringify({ meta, parent_task_id: "" })
                }, 15000, state.abortController.signal);

                const genData = await genRes.json();
                const taskId = genData?.data?.id;
                if (!taskId) throw new Error("Failed to start generation");

                // 4. Poll Progress
                await pollProgress(taskId, userToken, sessionId, count);

            } catch (error) {
                if (error.name === 'AbortError') {
                    showToast("Generation cancelled", "error");
                } else {
                    console.error(error);
                    showToast(error.message || "An error occurred", "error");
                    dom.imageGrid.innerHTML = '';
                    dom.emptyState.style.display = 'flex';
                }
            } finally {
                resetState();
            }
        }

        async function pollProgress(taskId, token, sessionId, count) {
            let progress = 30;
            
            return new Promise((resolve, reject) => {
                const interval = setInterval(async () => {
                    try {
                        const res = await fetchWithTimeout("https://api.seaart.io/art-studio/v1/generate/progress", {
                            method: "POST",
                            headers: { "token": token, "x-device-id": sessionId, "content-type": "application/json" },
                            body: JSON.stringify({ task_ids: [taskId] })
                        }, 10000, state.abortController.signal);

                        const data = await res.json();
                        const task = data?.data?.items?.[0];

                        if (task) {
                            const proc = task.process;
                            if (proc > 0 && proc < 100) {
                                const displayProgress = Math.min(30 + (proc * 0.6), 95);
                                updateProgress(displayProgress, "Rendering...");
                            }

                            if (proc === 100 && task.components) {
                                clearInterval(interval);
                                updateProgress(100, "Complete!");
                                setTimeout(() => {
                                    dom.progressContainer.style.display = 'none';
                                    displayResults(task.components);
                                    resolve();
                                }, 500);
                            }
                        }
                    } catch (err) {
                        clearInterval(interval);
                        reject(err);
                    }
                }, 2000);
            });
        }

        function displayResults(components) {
            dom.imageGrid.innerHTML = '';
            
            components.forEach((comp, idx) => {
                let imgUrl = comp.url;
                if (imgUrl.includes('.webm')) imgUrl = imgUrl.replace('.webm', '.jpg');

                const card = document.createElement('div');
                card.className = 'image-card';
                card.style.animationDelay = `${idx * 0.1}s`;
                
                card.innerHTML = `
                    <img src="${imgUrl}" alt="Art ${idx+1}" loading="lazy">
                    <div class="image-actions">
                        <button class="icon-btn" title="Download" onclick="event.stopPropagation(); downloadImage('${imgUrl}', 'synax-${idx}.jpg')">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="icon-btn" title="Expand" onclick="openLightbox('${imgUrl}')">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                `;

                // FIX: Remove invalid/error images completely
                const imgEl = card.querySelector('img');
                imgEl.onerror = function() {
                    console.warn(`Failed to load image ${idx}, removing card.`);
                    card.remove();
                };
                
                card.addEventListener('click', () => openLightbox(imgUrl));
                dom.imageGrid.appendChild(card);
            });
            
            if (dom.imageGrid.children.length > 0) {
                showToast(`Generated ${dom.imageGrid.children.length} images successfully!`);
            } else {
                showToast("Images failed to load or were blocked.", "error");
            }
        }

        window.openLightbox = (url) => {
            dom.lightboxImg.src = url;
            dom.lightbox.classList.add('active');
        };

        function updateProgress(percent, text) {
            dom.progressFill.style.width = `${percent}%`;
            dom.progressPercent.textContent = `${Math.floor(percent)}%`;
            if (text) dom.progressStatus.textContent = text;
        }

        function resetState() {
            state.isGenerating = false;
            state.abortController = null;
            dom.generateBtn.disabled = false;
            dom.generateBtn.innerHTML = '<i class="fas fa-bolt"></i> Generate Art';
        }

        async function fetchWithTimeout(url, options, timeout = 5000, signal) {
            const controller = new AbortController();
            const combinedSignal = signal ? 
                AbortSignal.any([signal, controller.signal]) : 
                controller.signal; 
            
            if (signal && !AbortSignal.any) {
                signal.addEventListener('abort', () => controller.abort());
            }

            const id = setTimeout(() => controller.abort(), timeout);

            try {
                const response = await fetch(url, { ...options, signal: combinedSignal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        dom.generateBtn.addEventListener('click', handleGenerate);

        dom.prompt.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleGenerate();
            }
        });

    </script>
</body>
</html>
